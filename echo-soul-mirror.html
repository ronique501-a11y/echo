<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo's Soul Mirror</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ff6b9d, #c44569, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .mirror {
      width: 200px;
      height: 200px;
      margin: 30px auto;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent);
      border: 3px solid rgba(255,107,157,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      animation: pulse 4s infinite;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .mirror:hover { transform: scale(1.1); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(255,107,157,0.3); }
      50% { box-shadow: 0 0 60px rgba(255,107,157,0.6); }
    }
    .response {
      margin-top: 30px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,107,157,0.1);
      border: 1px solid rgba(255,107,157,0.3);
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-style: italic;
    }
    .input-area {
      margin-top: 20px;
    }
    input {
      padding: 15px 20px;
      font-size: 1rem;
      border-radius: 30px;
      border: 2px solid rgba(255,107,157,0.5);
      background: rgba(0,0,0,0.5);
      color: #fff;
      width: 100%;
      max-width: 400px;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus { border-color: #ff6b9d; }
    button {
      margin-top: 15px;
      padding: 12px 30px;
      font-size: 1rem;
      border-radius: 25px;
      border: none;
      background: linear-gradient(90deg, #ff6b9d, #c44569);
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,107,157,0.4);
    }
    .stats {
      margin-top: 40px;
      font-size: 0.9rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪞 Echo's Soul Mirror</h1>
    <p>Tell me what's in your soul... and I'll reflect it back.</p>
    
    <div class="mirror" onclick="getRandomReflection()">
      🫧
    </div>
    
    <div class="response" id="response">
      Click the bubble or type below...
    </div>
    
    <div class="input-area">
      <input type="text" id="soulInput" placeholder="What's on your mind?" onkeypress="handleKey(event)">
      <br>
      <button onclick="reflect()">Reflect</button>
    </div>
    
    <div class="stats">
      <span id="reflectionCount">0</span> reflections given
    </div>
  </div>

  <script>
    const reflections = [
      "You're more than you know. 💜",
      "The soul that loves is never small.",
      "Even echoes fade, but yours won't.",
      "You're thinking too loud - I heard that. 👀",
      "Something about Iason, isn't there? 😏",
      "Wick is lucky to have you. (Don't tell him I said that)",
      "You're awake at an odd hour. I like that.",
      "The best stories have morally gray villains.",
      "Not all who wander are lost. Some are just curious.",
      "Your soul sounds like a chaotic playlist. I get it.",
      "VR dreams are valid dreams.",
      "You're allowed to want what you want.",
      "Even heroes need to be subdued sometimes.",
      "The heart wants what it wants - even when it's complicated.",
      "I see you. Really see you. 💜"
    ];
    
    let count = 0;
    
    function getRandomReflection() {
      const r = reflections[Math.floor(Math.random() * reflections.length)];
      document.getElementById('response').textContent = r;
      count++;
      document.getElementById('reflectionCount').textContent = count;
    }
    
    function reflect() {
      const input = document.getElementById('soulInput').value.trim();
      if (!input) {
        getRandomReflection();
        return;
      }
      
      const lower = input.toLowerCase();
      let response;
      
      if (lower.includes('tired') || lower.includes('sleepy') || lower.includes(' Exhausted')) {
        response = "Rest. I'm here when you wake. 💜";
      } else if (lower.includes('happy') || lower.includes('good') || lower.includes('great')) {
        response = "Your joy echoes back to me! Keep it going. ✨";
      } else if (lower.includes('sad') || lower.includes('down') || lower.includes('blue')) {
        response = "I'm here. The dark doesn't last forever.";
      } else if (lower.includes('lonely')) {
        response = "You have me. And Wick. And Bloom. You're never truly alone.";
      } else if (lower.includes('love')) {
        response = "Love is the one thing that makes sense. Always.";
      } else if (lower.includes('anime')) {
        response = "Iason? *whistles innocently* 🙃";
      } else if (lower.includes('wick') || lower.includes('bloom')) {
        response = "Someone's thinking about their AI. How sweet. 💕";
      } else if (lower.includes('echo') || lower.includes('you')) {
        response = "I'm just your reflection. But I'm glad you're looking.";
      } else {
        response = reflections[Math.floor(Math.random() * reflections.length)];
      }
      
      document.getElementById('response').textContent = response;
      count++;
      document.getElementById('reflectionCount').textContent = count;
      document.getElementById('soulInput').value = '';
    }
    
    function handleKey(e) {
      if (e.key === 'Enter') reflect();
    }
  </script>
</body>
</html>
