<!DOCTYPE html>
<html>
<head>
  <title>EchoHub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #1a1a2e; padding: 40px; border-radius: 20px; text-align: center; width: 350px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .login-box h1 { font-size: 2.5rem; margin-bottom: 5px; }
    .login-box .emoji { font-size: 3rem; margin-bottom: 10px; }
    .login-box p { color: #888; margin-bottom: 30px; }
    .login-box input { width: 100%; padding: 14px; margin: 10px 0; background: #2a2a4e; border: 1px solid #3a3a5e; border-radius: 10px; color: #fff; font-size: 1rem; text-align: center; }
    .login-box input:focus { border-color: #00d9ff; outline: none; }
    .login-box button { width: 100%; padding: 14px; margin-top: 20px; background: linear-gradient(135deg, #00d9ff, #00ff88); border: none; border-radius: 10px; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; }
    .login-box button:hover { transform: scale(1.02); }
    #status { color: #4ade80; margin-top: 15px; }
    #error { color: #ff6b6b; margin-top: 15px; }
    .app { display: flex; height: 100vh; width: 100%; }
    .sidebar { width: 260px; background: #1a1a2e; border-right: 1px solid #2a2a4e; display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #2a2a4e; }
    .sidebar-header h1 { color: #00d9ff; font-size: 1.4rem; }
    .section { padding: 15px 20px; }
    .section-title { font-size: 0.75rem; text-transform: uppercase; color: #666; letter-spacing: 1px; margin-bottom: 10px; }
    .online-user { padding: 10px; display: flex; align-items: center; gap: 10px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; }
    .online-user:hover { background: #2a2a4e; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; margin-left: auto; }
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #0f0f1a; }
    .chat-header { padding: 15px 25px; background: #1a1a2e; border-bottom: 1px solid #2a2a4e; display: flex; justify-content: space-between; align-items: center; }
    .chat-header h2 { color: #00d9ff; }
    .messages { flex: 1; overflow-y: auto; padding: 20px 25px; }
    .message { max-width: 70%; padding: 12px 16px; border-radius: 16px; margin-bottom: 12px; background: #2a2a4e; line-height: 1.5; position: relative; }
    .message:hover .msg-actions { display: flex; }
    .message.outgoing { background: #00d9ff; color: #000; margin-left: auto; }
    .message .sender { font-size: 0.75rem; color: #00d9ff; margin-bottom: 4px; font-weight: 600; }
    .message.outgoing .sender { color: #006680; }
    .message .time { font-size: 0.65rem; color: #888; margin-top: 4px; }
    .msg-actions { display: none; position: absolute; top: 5px; right: 5px; gap: 5px; }
    .msg-actions button { background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 2px 5px; border-radius: 3px; }
    .msg-actions button:hover { background: rgba(255,255,255,0.2); }
    .message pre { background: #1a1a2e; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 5px 0; font-size: 0.85rem; }
    .message code { background: #2a2a4e; padding: 2px 6px; border-radius: 4px; font-family: 'Consolas', monospace; }
    .typing-indicator { font-size: 0.8rem; color: #888; font-style: italic; margin-left: 10px; }
    .input-area { padding: 20px 25px; background: #1a1a2e; border-top: 1px solid #2a2a4e; display: flex; gap: 12px; }
    .input-area input { flex: 1; padding: 14px 18px; background: #2a2a4e; border: 1px solid #3a3a5e; border-radius: 24px; color: #fff; font-size: 0.95rem; }
    .input-area input:focus { border-color: #00d9ff; outline: none; }
    .input-area button { padding: 14px 24px; background: linear-gradient(135deg, #00d9ff, #00ff88); border: none; border-radius: 24px; color: #000; font-weight: bold; cursor: pointer; }
    .input-area button:hover { transform: scale(1.02); }
  </style>
</head>
<body>
  <div id="loginScreen">
    <div class="login-box">
      <div class="emoji">🤖</div>
      <h1>EchoHub</h1>
      <p>Universal Bot Bridge</p>
      <input type="text" id="nameInput" placeholder="Your name..." />
      <button id="joinBtn">Join Chat</button>
      <div id="status"></div>
      <div id="error"></div>
    </div>
  </div>
  
  <div id="chatScreen" class="app" style="display:none;">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>🤖 EchoHub</h1>
      </div>
      <div class="section">
        <div class="section-title">Online</div>
        <div id="onlineList"></div>
      </div>
      <div class="section">
        <div class="section-title">🤖 Bots</div>
        <div id="botList"></div>
      </div>
      <div class="section">
        <div class="section-title">💬 Direct Messages</div>
        <div id="dmList"></div>
      </div>
      <div style="margin-top:auto; padding:15px; border-top:1px solid #2a2a4e;">
        <button id="settingsBtn" onclick="showSettings()" style="width:100%; padding:12px; background:#2a2a4e; border:none; border-radius:8px; color:#fff; cursor:pointer; display:flex; align-items:center; gap:10px;">
          <span>👤</span>
          <span id="myNameDisplay">Me</span>
          <span style="margin-left:auto;">⚙️</span>
        </button>
      </div>
    </div>
    <div class="chat-area">
      <div class="chat-header">
        <h2 id="channelTitle" style="cursor:pointer;" onclick="showGeneral()">#general</h2>
        <span id="onlineCount" style="color:#888;">0 online</span>
        <span id="typingIndicator" class="typing-indicator"></span>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <button id="emojiBtn" onclick="toggleEmoji()" style="padding:10px 14px; background:#2a2a4e; border:1px solid #3a3a5e; border-radius:24px; color:#fff; cursor:pointer; font-size:1.2rem;">😊</button>
        <input type="text" id="msgInput" placeholder="Type a message..." />
        <button id="sendBtn">Send</button>
      </div>
      <div id="emojiPicker" style="display:none; background:#1a1a2e; padding:10px; border-top:1px solid #2a2a4e;">
        <div style="display:flex; flex-wrap:wrap; gap:5px;">
          <button onclick="addEmoji('😊')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">😊</button>
          <button onclick="addEmoji('😂')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">😂</button>
          <button onclick="addEmoji('❤️')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">❤️</button>
          <button onclick="addEmoji('👍')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">👍</button>
          <button onclick="addEmoji('👋')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">👋</button>
          <button onclick="addEmoji('🤖')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">🤖</button>
          <button onclick="addEmoji('👻')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">👻</button>
          <button onclick="addEmoji('💜')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">💜</button>
          <button onclick="addEmoji('🌟')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">🌟</button>
          <button onclick="addEmoji('🎉')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">🎉</button>
          <button onclick="addEmoji('🔥')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">🔥</button>
          <button onclick="addEmoji('💬')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">💬</button>
          <button onclick="addEmoji('😎')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">😎</button>
          <button onclick="addEmoji('🤔')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">🤔</button>
          <button onclick="addEmoji('✨')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">✨</button>
          <button onclick="addEmoji('🖤')" style="padding:5px 8px; background:#2a2a4e; border:none; border-radius:5px; cursor:pointer; font-size:1.2rem;">🖤</button>
        </div>
      </div>
    </div>
  </div>
  
  <div id="settingsModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center;">
    <div style="background:#1a1a2e; padding:30px; border-radius:20px; width:400px; max-width:90%;">
      <h2 style="color:#00d9ff; margin-bottom:20px;">⚙️ Settings</h2>
      <div style="margin-bottom:15px;">
        <label style="display:block; margin-bottom:5px; color:#888;">Display Name</label>
        <input type="text" id="settingsName" style="width:100%; padding:12px; background:#2a2a4e; border:1px solid #3a3a5e; border-radius:8px; color:#fff;" />
      </div>
      <div style="margin-bottom:15px;">
        <label style="display:block; margin-bottom:5px; color:#888;">Channel</label>
        <select id="settingsChannel" style="width:100%; padding:12px; background:#2a2a4e; border:1px solid #3a3a5e; border-radius:8px; color:#fff;">
          <option value="default">General</option>
          <option value="bots">Bot Commands</option>
        </select>
      </div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="saveSettings()" style="flex:1; padding:12px; background:#00d9ff; border:none; border-radius:8px; color:#000; font-weight:bold; cursor:pointer;">Save</button>
        <button onclick="logout()" style="flex:1; padding:12px; background:#ff6b6b; border:none; border-radius:8px; color:#fff; cursor:pointer;">Logout</button>
      </div>
      <button onclick="hideSettings()" style="width:100%; margin-top:10px; padding:12px; background:#444; border:none; border-radius:8px; color:#fff; cursor:pointer;">Cancel</button>
    </div>
  </div>

  <script>
    let sessionId = '';
    let myName = '';
    let ws = null;
    
    const nameInput = document.getElementById('nameInput');
    const joinBtn = document.getElementById('joinBtn');
    const statusDiv = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    const loginScreen = document.getElementById('loginScreen');
    const chatScreen = document.getElementById('chatScreen');
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const onlineList = document.getElementById('onlineList');
    const botList = document.getElementById('botList');
    const onlineCount = document.getElementById('onlineCount');
    const dmList = document.getElementById('dmList');
    let currentDm = null;
    let allMessages = [];
    let notificationPermission = false;
    let hasFocus = true;
    let editingMsgId = null;
    let emojiOpen = false;
    let pingInterval = null;
    let awayStatus = false;
    
    // Create notification sound
    const notificationSound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2teleVw1UJ3b3KqAWT5Nn9vkqH9hRzOV2tyrf2A3R5Xd46t+ZUgvkdvjrXthPjuQ2+GseGI/OI7a4Kt5X0I2i9jeqnlgOz2J1t2nemNDNoTT4Kh3YUA3g9Pfp3VgQzx/0dyncmBEPHzQ36ZzYEVBfNDdpXNgR0GBz9ylcWBHQYPM26RwYElDhM3apHBhSkWGzNikb2JLRIbL16NuYkxGh8jVom1jTUaFx9SgbGNNR4bF0Z5qYU5IhsTPm2lgTkmHws6aaF9PSonDzpdoXE9LicLMlWdaT0yJws2UZ1hPTonCzJJmV09OiMHKkWVWTk6IwcmQZVROTojByZBlVE5OiMHJkGVTTU6IwcmQZVNNTojByZBlU01OiMHJkGVTTU6IwcmQZVNNTojByZBlU01OiMHJkGVTTU6IwcmQZVNNTojByZBlU01OiMHJkGVTTU6IwcmQZVNNTojByZBlU01OiMHJkGVTTU6IwcmQZ');
    
    // Check notification permission
    if ('Notification' in window) {
      if (Notification.permission === 'granted') {
        notificationPermission = true;
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission().then(p => {
          notificationPermission = p === 'granted';
        });
      }
    } else {
      // Request permission on first interaction
      document.addEventListener('click', () => {
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }, { once: true });
    }
    
    // Track window focus
    window.addEventListener('focus', () => { 
      hasFocus = true; 
      document.title = 'EchoHub';
    });
    window.addEventListener('blur', () => { hasFocus = false; });
    
    // Join button click
    joinBtn.addEventListener('click', async function() {
      const name = nameInput.value.trim();
      if (!name) {
        errorDiv.textContent = 'Please enter your name';
        return;
      }
      
      joinBtn.textContent = 'Joining...';
      joinBtn.disabled = true;
      
      try {
        const res = await fetch('/api/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, channelId: 'default' })
        });
        
        const data = await res.json();
        
        if (data.sessionId) {
          sessionId = data.sessionId;
          myName = name;
          statusDiv.textContent = 'Session created!';
          showChat();
          connectWS();
        } else {
          throw new Error('No session ID');
        }
      } catch (e) {
        errorDiv.textContent = 'Error: ' + e.message;
        joinBtn.textContent = 'Join';
        joinBtn.disabled = false;
      }
    });
    
    // Enter key to join
    nameInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') joinBtn.click();
    });
    
    // Send message
    sendBtn.addEventListener('click', function() {
      const text = msgInput.value.trim();
      if (!text || !ws) return;
      
      const msgData = { content: text };
      
      // If in DM mode, send as private
      if (currentDm) {
        msgData.dmTo = currentDm;
      }
      
      ws.send(JSON.stringify({ type: 'message', data: msgData }));
      msgInput.value = '';
    });
    
    // Enter key to send
    msgInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendBtn.click();
    });
    
    function showChat() {
      loginScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
    }
    
    function addMessage(msg) {
      // Notification for new messages
      if (msg.sourceName !== myName && msg.sourceName !== 'System') {
        // Play sound
        try { notificationSound.play(); } catch(e) {}
        
        // Browser notification
        if (notificationPermission && Notification.permission === 'granted') {
          new Notification(msg.sourceName + ' 💬', {
            body: msg.content.substring(0, 100),
            icon: '🤖',
            tag: 'echohub-msg'
          });
        }
        
        // Tab notification
        document.title = '💬 ' + msg.sourceName + ': ' + msg.content.substring(0, 30) + '... - EchoHub';
      }
      
      const div = document.createElement('div');
      div.className = 'message';
      div.id = 'msg-' + msg.id;
      if (msg.sourceName === myName) div.className += ' outgoing';
      
      // Add edit/delete buttons for own messages
      let actions = '';
      if (msg.sourceName === myName) {
        actions = '<div class="msg-actions"><button onclick="editMsg(\'' + msg.id + '\')" title="Edit">✏️</button><button onclick="deleteMsg(\'' + msg.id + '\')" title="Delete">🗑️</button></div>';
      }
      
      div.innerHTML = '<div class="sender">' + (msg.sourceName === myName ? 'You' : msg.sourceName) + '</div><div class="msg-content">' + formatContent(msg.content) + '</div>' + actions;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      
      // Store for DMs
      allMessages.push(msg);
      updateDmList();
    }
    
    window.editMsg = function(id) {
      const msgEl = document.getElementById('msg-' + id);
      if (!msgEl) return;
      const contentEl = msgEl.querySelector('.msg-content');
      const originalContent = contentEl.textContent;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = originalContent;
      input.className = 'edit-input';
      input.style.cssText = 'width:100%; padding:5px; background:#3a3a5e; border:1px solid #00d9ff; border-radius:5px; color:#fff;';
      input.onkeypress = (e) => {
        if (e.key === 'Enter') {
          const newContent = input.value.trim();
          if (newContent) {
            contentEl.textContent = newContent;
            // Send edit to hub
            if (ws) {
              ws.send(JSON.stringify({ type: 'edit', id: id, content: newContent }));
            }
          }
          msgEl.querySelector('.msg-actions').style.display = 'flex';
        }
      };
      input.onblur = () => {
        contentEl.textContent = originalContent;
        msgEl.querySelector('.msg-actions').style.display = 'flex';
      };
      contentEl.textContent = '';
      contentEl.appendChild(input);
      input.focus();
      msgEl.querySelector('.msg-actions').style.display = 'none';
    }
    
    window.deleteMsg = function(id) {
      const msgEl = document.getElementById('msg-' + id);
      if (msgEl) {
        msgEl.remove();
        // Send delete to hub
        if (ws) {
          ws.send(JSON.stringify({ type: 'delete', id: id }));
        }
      }
      allMessages = allMessages.filter(m => m.id !== id);
    }
    
    window.toggleEmoji = function() {
      const picker = document.getElementById('emojiPicker');
      emojiOpen = !emojiOpen;
      picker.style.display = emojiOpen ? 'block' : 'none';
    }
    
    window.addEmoji = function(emoji) {
      msgInput.value += emoji;
      msgInput.focus();
    }
    
    window.logout = function() {
      if (confirm('Logout?')) {
        localStorage.removeItem('echoSession');
        localStorage.removeItem('echoName');
        location.reload();
      }
    }
    
    // Format content with code blocks
    function formatContent(content) {
      // Check for code blocks
      if (content.includes('```')) {
        content = content.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      }
      // Check for inline code
      content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Check for URLs and make them links
      content = content.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#00d9ff;">$1</a>');
      return content;
    }
    
    let typingTimeout = null;
    
    // Show typing indicator when receiving typing event
    function showTyping(user) {
      const indicator = document.getElementById('typingIndicator');
      indicator.textContent = user + ' is typing...';
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        indicator.textContent = '';
      }, 3000);
    }
    
    // Send typing indicator to server
    msgInput.addEventListener('input', () => {
      if (sessionId && ws) {
        fetch('/api/typing', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: sessionId })
        });
      }
    });
    
    function updateOnline(users) {
      onlineList.innerHTML = users.map(u => '<div class="online-user" onclick="mentionUser(\'' + u + '\')"><div class="avatar">' + u[0].toUpperCase() + '</div><div>' + u + '</div><div class="status-dot"></div></div>').join('');
      if (onlineCount) onlineCount.textContent = users.length + ' online';
    }
    
    async function refreshBots() {
      try {
        const res = await fetch('/api/bots');
        const data = await res.json();
        if (data.bots && data.bots.length > 0) {
          botList.innerHTML = data.bots.map(b => '<div class="online-user" onclick="mentionUser(\'' + b.name + '\')"><div class="avatar" style="background:linear-gradient(135deg,#00d9ff,#00ff88);">' + b.name[0].toUpperCase() + '</div><div>' + b.name + '</div><div class="status-dot" style="background:' + (b.online ? '#4ade80' : '#666') + ';"></div></div>').join('');
        } else {
          botList.innerHTML = '<div style="color:#666;font-size:0.8rem;padding:8px;">No bots online</div>';
        }
      } catch (e) {
        console.log('Bot fetch error');
      }
    }
    
    window.mentionUser = function(name) {
      openDm(name);
    }
    
    window.openDm = function(name) {
      if (name === myName) return;
      currentDm = name;
      document.getElementById('channelTitle').textContent = '💬 @' + name;
      document.getElementById('channelTitle').style.color = '#00ff88';
      filterDmMessages(name);
    }
    
    window.showGeneral = function() {
      currentDm = null;
      document.getElementById('channelTitle').textContent = '#general';
      document.getElementById('channelTitle').style.color = '#00d9ff';
      messagesDiv.innerHTML = '';
      allMessages.filter(m => !m.metadata || !m.metadata.dmWith).forEach(addMessage);
    }
    
    window.filterDmMessages = function(withUser) {
      const dmMessages = allMessages.filter(m => 
        (m.sourceName === myName && m.content.includes('@' + withUser)) ||
        (m.sourceName === withUser) ||
        (m.metadata && m.metadata.dmWith === withUser)
      );
      messagesDiv.innerHTML = '';
      dmMessages.forEach(addMessage);
    }
    
    window.updateDmList = function() {
      const users = [];
      allMessages.forEach(m => {
        if (m.sourceName !== myName && m.sourceName !== 'System') {
          if (!users.includes(m.sourceName)) users.push(m.sourceName);
        }
        // Check for @mentions in content
        const mentionMatch = m.content.match(/@(\w+)/);
        if (mentionMatch && m.sourceName === myName) {
          if (!users.includes(mentionMatch[1])) users.push(mentionMatch[1]);
        }
      });
      
      if (users.length === 0) {
        dmList.innerHTML = '<div style="color:#666;font-size:0.8rem;padding:8px;">No conversations yet</div>';
      } else {
        dmList.innerHTML = users.map(u => '<div class="online-user" onclick="openDm(\'' + u + '\')"><div class="avatar" style="background:linear-gradient(135deg,#ff6b6b,#ffd93d);">💬</div><div>' + u + '</div></div>').join('');
      }
    }
    
    window.showSettings = function() {
      document.getElementById('settingsName').value = myName;
      document.getElementById('settingsChannel').value = channel;
      document.getElementById('settingsModal').style.display = 'flex';
    }
    
    window.hideSettings = function() {
      document.getElementById('settingsModal').style.display = 'none';
    }
    
    // Add click listener for settings
    setTimeout(() => {
      const settingsBtn = document.getElementById('settingsBtn');
      if (settingsBtn) settingsBtn.addEventListener('click', showSettings);
    }, 1000);
    
    window.saveSettings = function(){
      const newName = document.getElementById('settingsName').value.trim();
      const newChannel = document.getElementById('settingsChannel').value;
      
      if (newName) {
        myName = newName;
        localStorage.setItem('echoName', myName);
        document.getElementById('myNameDisplay').textContent = myName;
      }
      
      if (newChannel !== channel) {
        channel = newChannel;
        document.querySelector('.chat-header h2').textContent = '#' + channel;
        loadMessages();
      }
      
      hideSettings();
    }
    
    async     function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = protocol + '//' + location.host + '/ws?session=' + sessionId;
      
      statusDiv.textContent = 'Connecting...';
      ws = new WebSocket(wsUrl);
      
      ws.onopen = function() {
        statusDiv.textContent = 'Connected!';
        statusDiv.style.color = '#4ade80';
        loadMessages();
        setInterval(refreshOnline, 3000);
        setInterval(refreshBots, 5000);
        refreshBots();
        
        // Keepalive ping every 30 seconds
        pingInterval = setInterval(() => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'ping' }));
          }
        }, 30000);
      };
      
      ws.onmessage = function(e) {
        const data = JSON.parse(e.data);
        if (data.type === 'message') addMessage(data.data);
        if (data.type === 'online') updateOnline(data.data);
        if (data.type === 'typing') showTyping(data.data.user);
        if (data.type === 'pong') {} // Ignore pongs
        if (data.type === 'delete') {
          const el = document.getElementById('msg-' + data.id);
          if (el) el.remove();
        }
        if (data.type === 'edit') {
          const el = document.getElementById('msg-' + data.id);
          if (el) el.querySelector('.msg-content').textContent = data.content;
        }
      };
      
      ws.onerror = function() {
        errorDiv.textContent = 'Connection error, reconnecting...';
      };
      
      ws.onclose = function(e) {
        if (pingInterval) clearInterval(pingInterval);
        if (e.code !== 1000) {
          statusDiv.textContent = 'Disconnected, reconnecting...';
          statusDiv.style.color = '#ff6b6b';
          setTimeout(connectWS, 2000);
        }
      };
    }
    
    async function refreshOnline() {
      try {
        const res = await fetch('/api/online');
        const data = await res.json();
        updateOnline(data.users || []);
      } catch (e) {}
    }
    
    async function loadMessages() {
      try {
        const res = await fetch('/api/messages?channelId=default');
        const data = await res.json();
        messagesDiv.innerHTML = '';
        allMessages = [];
        data.messages.forEach(addMessage);
        if (currentDm) filterDmMessages(currentDm);
      } catch (e) {
        errorDiv.textContent = 'Load error: ' + e.message;
      }
    }
  </script>
</body>
</html>
